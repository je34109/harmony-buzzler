services:
  warp:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    restart: unless-stopped

  backend:
    build: ./backend
    platform: linux/amd64
    depends_on:
      - warp
    ports:
      - "7860:7860"
    volumes:
      - hb-data:/tmp/harmony-buzzler
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:7860
      - HB_DATA_DIR=/tmp/harmony-buzzler
      - ALL_PROXY=socks5h://warp:9091

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:7860
    depends_on:
      - backend

volumes:
  hb-data:
